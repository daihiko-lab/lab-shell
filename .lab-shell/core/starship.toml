add_newline = true
command_timeout = 1000

format = """
${custom.user_host} $battery $time$cmd_duration$jobs
$directory$git_branch$git_status
${custom.python_project}${custom.julia_project}${custom.r_project}${custom.rust_project}${custom.c_project}${custom.java_project}${custom.virtualenv}
$character
"""

[character]
success_symbol = "[❯](bold 76)"
error_symbol = "[❯](bold 196)"

[custom.user_host]
command = '''
u="${USER:-$(whoami 2>/dev/null)}"
h="$(hostname 2>/dev/null)"
if [ -z "$h" ]; then
  printf "%s" "$u"
elif [ ${#h} -gt 28 ]; then
  printf "%s on %s...%s" "$u" "${h%${h#????????????}}" "${h#${h%????????}}"
else
  printf "%s on %s" "$u" "$h"
fi
'''
when = "true"
format = "$output"
shell = ["sh"]

[battery]
disabled = false
format = " [BAT:$percentage$symbol]($style)"
full_symbol = "="
charging_symbol = "+"
discharging_symbol = "-"
unknown_symbol = "?"
empty_symbol = "!"

[[battery.display]]
threshold = 20
style = "bold #ff005f"

[[battery.display]]
threshold = 50
style = "bold #ffaf00"

[[battery.display]]
threshold = 100
style = "bold #5fd75f"

[time]
disabled = false
format = " [TIME:$time]($style)"
time_format = "%H:%M:%S"
style = "bold #8a8a8a"

[cmd_duration]
min_time = 3000
format = " [RUN:$duration]($style)"
style = "bold #ffaf00"

[jobs]
symbol = ""
number_threshold = 1
format = " [JOBS:$number]($style)"
style = "bold #ff005f"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold #00afff"

[directory.substitutions]
"schelling-segregation-sim" = "seg-sim"

[git_branch]
format = " [$branch]($style)"
style = "bold #5fd75f"

[git_status]
format = "[$ahead_behind$stashed$conflicted$staged$modified$untracked$renamed$deleted]($style)"
style = "bold #d7af00"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
stashed = "*${count}"
conflicted = "~${count}"
staged = "+${count}"
modified = "!${count}"
untracked = "?${count}"
renamed = "»${count}"
deleted = "✘${count}"

[custom.python_project]
when = ''' test -f pyproject.toml || test -f requirements.txt || test -f setup.py || test -f Pipfile '''
command = '''
name=""
if [ -f pyproject.toml ]; then
  name="$(awk -F'"' '/^name[[:space:]]*=/{print $2; exit}' pyproject.toml 2>/dev/null)"
fi
[ -n "$name" ] || name="project"
printf "PY:%s" "$name"
'''
format = " [$output](bold #ffd75f)"
shell = ["sh"]

[custom.julia_project]
when = ''' test -f Project.toml || test -f Manifest.toml '''
command = '''
name=""
if [ -f Project.toml ]; then
  name="$(awk -F'"' '/^name[[:space:]]*=/{print $2; exit}' Project.toml 2>/dev/null)"
fi
[ -n "$name" ] || name="project"
printf "JL:%s" "$name"
'''
format = " [$output](bold #af87ff)"
shell = ["sh"]

[custom.r_project]
when = ''' test -n "$(ls *.Rproj 2>/dev/null)" || test -d renv '''
command = '''
if ls *.Rproj >/dev/null 2>&1; then
  f="$(ls *.Rproj 2>/dev/null | head -n 1)"
  base="${f%.Rproj}"
  printf "R:%s" "${base:-project}"
else
  printf "R:renv"
fi
'''
format = " [$output](bold #0087ff)"
shell = ["sh"]

[custom.rust_project]
when = ''' test -f Cargo.toml '''
command = '''
name="$(awk -F'"' '/^name[[:space:]]*=/{print $2; exit}' Cargo.toml 2>/dev/null)"
[ -n "$name" ] || name="cargo"
printf "RS:%s" "$name"
'''
format = " [$output](bold #ff8700)"
shell = ["sh"]

[custom.c_project]
when = ''' test -f CMakeLists.txt || test -f Makefile || test -f makefile || test -f meson.build '''
format = " [C:project](bold #5fafff)"
shell = ["sh"]

[custom.java_project]
when = ''' test -f pom.xml || test -f build.gradle || test -f build.gradle.kts '''
command = '''
if [ -f pom.xml ]; then
  printf "JAVA:maven"
else
  printf "JAVA:gradle"
fi
'''
format = " [$output](bold #d78700)"
shell = ["sh"]

[custom.virtualenv]
when = ''' test -n "$VIRTUAL_ENV" '''
command = ''' basename "$VIRTUAL_ENV" '''
format = " ([${output}]($style))"
style = "bold #ffd75f"
shell = ["sh"]
