add_newline = true
command_timeout = 1000

format = """
$username$hostname $battery $time$cmd_duration$jobs
$directory$git_branch$git_status
${custom.python_project}${custom.julia_project}${custom.r_project}${custom.rust_project}${custom.c_project}${custom.java_project}${custom.virtualenv}
$character
"""

[character]
success_symbol = "[❯](bold 76)"
error_symbol = "[❯](bold 196)"

[username]
show_always = true
format = "$user"

[hostname]
ssh_only = false
format = " on $hostname"

[battery]
disabled = false
format = " [BAT:$percentage$symbol]($style)"
full_symbol = "="
charging_symbol = "+"
discharging_symbol = "-"
unknown_symbol = "?"
empty_symbol = "!"

[[battery.display]]
threshold = 20
style = "bold #ff005f"

[[battery.display]]
threshold = 50
style = "bold #ffaf00"

[[battery.display]]
threshold = 100
style = "bold #5fd75f"

[time]
disabled = false
format = " [TIME:$time]($style)"
time_format = "%H:%M:%S"
style = "bold #8a8a8a"

[cmd_duration]
min_time = 3000
format = " [RUN:$duration]($style)"
style = "bold #ffaf00"

[jobs]
symbol = ""
number_threshold = 1
format = " [JOBS:$number]($style)"
style = "bold #ff005f"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold #00afff"

[git_branch]
format = " [$branch]($style)"
style = "bold #5fd75f"

[git_status]
format = "[$all_status$ahead_behind]($style)"
style = "bold #d7af00"

[custom.python_project]
when = ''' test -f pyproject.toml || test -f requirements.txt || test -f setup.py || test -f Pipfile '''
format = " [PY:project](bold #ffd75f)"
shell = ["sh"]

[custom.julia_project]
when = ''' test -f Project.toml || test -f Manifest.toml '''
format = " [JL:project](bold #af87ff)"
shell = ["sh"]

[custom.r_project]
when = ''' test -n "$(ls *.Rproj 2>/dev/null)" || test -d renv '''
format = " [R:project](bold #0087ff)"
shell = ["sh"]

[custom.rust_project]
when = ''' test -f Cargo.toml '''
format = " [RS:project](bold #ff8700)"
shell = ["sh"]

[custom.c_project]
when = ''' test -f CMakeLists.txt || test -f Makefile || test -f makefile || test -f meson.build '''
format = " [C:project](bold #5fafff)"
shell = ["sh"]

[custom.java_project]
when = ''' test -f pom.xml || test -f build.gradle || test -f build.gradle.kts '''
format = " [JAVA:project](bold #d78700)"
shell = ["sh"]

[custom.virtualenv]
when = ''' test -n "$VIRTUAL_ENV" '''
command = ''' basename "$VIRTUAL_ENV" '''
format = " ([${output}]($style))"
style = "bold #ffd75f"
shell = ["sh"]
